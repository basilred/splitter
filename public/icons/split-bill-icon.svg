<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="gradientPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="gradientSecondary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#gradientPrimary)" filter="url(#shadow)" />

  <!-- Main bill shape -->
  <path d="M40,40 L88,40 L88,88 L40,88 Z" fill="white" stroke="#E5E7EB" stroke-width="2" rx="8" ry="8" />
  <rect x="44" y="44" width="40" height="8" rx="2" fill="#D1D5DB" />
  <rect x="44" y="58" width="32" height="4" rx="1" fill="#9CA3AF" />
  <rect x="44" y="66" width="24" height="4" rx="1" fill="#9CA3AF" />

  <!-- Split line -->
  <line x1="64" y1="40" x2="64" y2="88" stroke="#4F46E5" stroke-width="3" stroke-dasharray="4 4" />

  <!-- Two circles representing people/money -->
  <circle cx="52" cy="78" r="6" fill="url(#gradientSecondary)" />
  <circle cx="76" cy="78" r="6" fill="url(#gradientSecondary)" />

  <!-- Plus and equal symbols -->
  <g stroke="white" stroke-width="3" stroke-linecap="round">
    <line x1="50" y1="78" x2="54" y2="78" />
    <line x1="52" y1="76" x2="52" y2="80" />
  </g>
  <g stroke="white" stroke-width="3" stroke-linecap="round">
    <line x1="74" y1="78" x2="78" y2="78" />
  </g>

  <!-- Outer ring -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.2" />
</svg>
